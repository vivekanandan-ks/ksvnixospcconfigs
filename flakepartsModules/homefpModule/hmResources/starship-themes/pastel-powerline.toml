format = """
[Óā∂](#9A348E)\
$os\
$shell\
$username\
[Óāį](bg:#DA627D fg:#9A348E)\
$directory\
[Óāį](fg:#DA627D bg:#FCA17D)\
${custom.jj}\
$git_branch\
$git_status\
[Óāį](fg:#FCA17D bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$nix_shell\
$shlvl\
[Óāį](fg:#86BBD8 bg:#06969A)\
$docker_context\
[Óāį](fg:#06969A bg:#33658A)\
$cmd_duration\
[Óāį ](fg:#33658A)\
