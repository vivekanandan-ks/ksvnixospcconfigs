#symbol = '‚ĚĄÔłŹ'
unknown_msg = '[unknown shell](bold yellow)'
format = '[$symbol$state( \($name\))]($style) '
#format = '[$state( \($name\))]($style) '

[shlvl]
disabled = false
format = '[$symbol level $shlvl]($style)'
symbol = '‚ÜēÔłŹ'
#style = "bg:#33658A"
#threshold = 2 # default is 2